<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Geometry Dash</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;display:flex;justify-content:center;align-items:center;height:100dvh;overflow:hidden;font-family:'Segoe UI',Arial,sans-serif;color:#fff;user-select:none;-webkit-user-select:none}
#gameContainer{position:relative;width:800px;max-width:100vw;aspect-ratio:800/450;border-radius:12px;overflow:hidden;box-shadow:0 0 60px rgba(74,158,255,.15)}
#gameCanvas{display:block;width:100%;height:100%;background:#1a1a2e;cursor:pointer}

#menuScreen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0f0f2a;z-index:10;transition:opacity .4s}
#menuScreen.hidden{opacity:0;pointer-events:none}
#menuScreen h1{font-size:clamp(28px,5vw,52px);font-weight:900;letter-spacing:2px;background:linear-gradient(135deg,#4a9eff,#a855f7,#4a9eff);background-size:200% 200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:gradientShift 3s ease infinite;margin-bottom:8px}
@keyframes gradientShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
#menuScreen p{font-size:14px;color:#666;margin-bottom:30px;letter-spacing:4px;text-transform:uppercase}
#levelGrid{display:grid;grid-template-columns:1fr 1fr;gap:14px;width:90%;max-width:500px}
.levelBtn{background:rgba(255,255,255,.04);border:2px solid rgba(255,255,255,.08);border-radius:12px;padding:16px 20px;cursor:pointer;transition:all .25s;text-align:left;position:relative;overflow:hidden}
.levelBtn:hover:not(.locked){background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.2);transform:translateY(-2px)}
.levelBtn.locked{opacity:.3;cursor:not-allowed}
.levelBtn .lvlNum{font-size:11px;font-weight:700;color:var(--lvl-color);opacity:.6;letter-spacing:1px}
.levelBtn .lvlName{font-size:18px;font-weight:700;margin:2px 0 4px}
.levelBtn .stars{font-size:13px;color:#fbbf24;letter-spacing:2px}
.levelBtn .check{position:absolute;top:10px;right:12px;font-size:18px;color:#22c55e}
.levelBtn .lvlBar{position:absolute;bottom:0;left:0;height:3px;background:var(--lvl-color);transition:width .5s}
.levelBtn.completed{border-color:rgba(34,197,94,.3)}

.overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.75);z-index:20;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(4px)}
.overlay.show{opacity:1;pointer-events:auto}
.overlay h2{font-size:clamp(28px,5vw,48px);font-weight:900;margin-bottom:6px}
.overlay .sub{font-size:14px;color:#999;margin-bottom:20px}
.overlay .attempts{font-size:13px;color:#666;margin-bottom:24px}
.btnGroup{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.btnGroup button{background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.12);border-radius:10px;padding:12px 28px;font-size:15px;font-weight:600;color:#fff;cursor:pointer;transition:all .2s;font-family:inherit}
.btnGroup button:hover{background:rgba(255,255,255,.14);border-color:rgba(255,255,255,.25);transform:translateY(-1px)}
.btnGroup button.primary{background:var(--lvl-color,#4a9eff);border-color:var(--lvl-color,#4a9eff)}
.btnGroup button.primary:hover{filter:brightness(1.15)}

#hud{position:absolute;top:0;left:0;right:0;padding:8px 14px;display:flex;align-items:center;gap:12px;z-index:5;background:linear-gradient(180deg,rgba(0,0,0,.5),transparent);pointer-events:none}
#hud>*{pointer-events:auto}
#hud .lvlLabel{font-size:12px;font-weight:600;opacity:.8;white-space:nowrap;letter-spacing:.5px}
#progressWrap{flex:1;height:6px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden;min-width:60px}
#progressBar{height:100%;width:0%;border-radius:3px;background:var(--lvl-color,#4a9eff);transition:width .15s linear}
#hud .pct{font-size:12px;font-weight:600;min-width:36px;text-align:right;opacity:.7;font-variant-numeric:tabular-nums}
#hud .attemptLabel{font-size:11px;opacity:.5;white-space:nowrap}

#pauseBtn{position:absolute;top:6px;right:14px;background:none;border:none;color:#fff;font-size:20px;cursor:pointer;z-index:5;opacity:.5;transition:opacity .2s;line-height:1;padding:4px}
#pauseBtn:hover{opacity:1}

#menuBtn{position:absolute;bottom:14px;left:14px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:6px 14px;font-size:12px;color:#fff;cursor:pointer;z-index:5;opacity:.4;transition:opacity .2s;font-family:inherit}
#menuBtn:hover{opacity:.8}

@media(max-width:500px){
#levelGrid{grid-template-columns:1fr;gap:10px}
.levelBtn{padding:12px 16px}
.levelBtn .lvlName{font-size:16px}
#hud{padding:6px 10px;gap:8px}
#hud .lvlLabel{font-size:10px}
#hud .pct{font-size:10px;min-width:30px}
#hud .attemptLabel{font-size:9px}
.btnGroup button{padding:10px 20px;font-size:13px}
}
</style>
</head>
<body>

<div id="gameContainer">
  <canvas id="gameCanvas" width="800" height="450"></canvas>

  <div id="menuScreen">
    <h1>GEOMETRY DASH</h1>
    <p>Escolha uma fase</p>
    <div id="levelGrid"></div>
  </div>

  <div id="hud">
    <span class="lvlLabel" id="hudLevel">Nível 1</span>
    <div id="progressWrap"><div id="progressBar"></div></div>
    <span class="pct" id="hudPct">0%</span>
    <span class="attemptLabel" id="hudAttempts">#0</span>
  </div>

  <button id="pauseBtn">⏸</button>
  <button id="menuBtn">← Menu</button>

  <div class="overlay" id="deathOverlay">
    <h2 style="color:#ef4444">✕</h2>
    <div class="sub">Você morreu!</div>
    <div class="attempts" id="deathAttempts">Tentativa #0</div>
    <div class="btnGroup">
      <button class="primary" id="retryBtn">Tentar Novamente</button>
      <button id="deathMenuBtn">Menu</button>
    </div>
  </div>

  <div class="overlay" id="completeOverlay">
    <h2 style="color:#22c55e">✓ NÍVEL COMPLETO!</h2>
    <div class="sub" id="completeSub"></div>
    <div class="attempts" id="completeAttempts"></div>
    <div class="btnGroup">
      <button class="primary" id="nextBtn">Próximo Nível</button>
      <button id="completeRetryBtn">Tentar Novamente</button>
      <button id="completeMenuBtn">Menu</button>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = 800, H = 450;

// ===== LEVEL DATA =====
const LEVELS = [
  {
    name: 'Início', color: '#4a9eff', speed: 3, length: 4500,
    obstacles: [
      {x:450,type:'spike'},{x:750,type:'spike'},{x:1050,type:'spike'},
      {x:1350,type:'spike'},{x:1750,type:'spike'},{x:2050,type:'spike'},
      {x:2350,type:'spike'},{x:2650,type:'spike'},{x:3050,type:'spike'},
      {x:3350,type:'spike'},{x:3650,type:'spike'},{x:3950,type:'spike'}
    ]
  },
  {
    name: 'Desafio', color: '#22c55e', speed: 4, length: 6000,
    obstacles: [
      {x:350,type:'spike'},{x:650,type:'spike'},{x:950,type:'spike'},
      {x:1250,type:'spike'},{x:1550,type:'spike'},{x:1750,type:'spike'},
      {x:1950,type:'spike'},{x:2150,type:'spike'},{x:2450,type:'spike'},
      {x:2750,type:'spike'},{x:2950,type:'spike'},{x:3150,type:'spike'},
      {x:3450,type:'spike'},{x:3750,type:'spike'},{x:4050,type:'spike'},
      {x:4350,type:'spike'},{x:4650,type:'spike'},{x:4950,type:'spike'},
      {x:5250,type:'spike'},{x:5550,type:'spike'},{x:1050,type:'block'},
      {x:3050,type:'block'},{x:4750,type:'block'}
    ]
  },
  {
    name: 'Difícil', color: '#a855f7', speed: 5, length: 7500,
    obstacles: [
      {x:300,type:'spike'},{x:500,type:'spike'},{x:700,type:'spike'},
      {x:900,type:'spike'},{x:1100,type:'spike'},{x:1300,type:'spike'},
      {x:1600,type:'spike'},{x:1800,type:'spike'},{x:2000,type:'spike'},
      {x:2200,type:'spike'},{x:2400,type:'spike'},{x:2600,type:'spike'},
      {x:2900,type:'spike'},{x:3100,type:'spike'},{x:3300,type:'spike'},
      {x:3500,type:'spike'},{x:3700,type:'spike'},{x:4000,type:'spike'},
      {x:4200,type:'spike'},{x:4400,type:'spike'},{x:4600,type:'spike'},
      {x:4800,type:'spike'},{x:5100,type:'spike'},{x:5300,type:'spike'},
      {x:5500,type:'spike'},{x:5700,type:'spike'},{x:5900,type:'spike'},
      {x:6100,type:'spike'},{x:6400,type:'spike'},{x:6600,type:'spike'},
      {x:6800,type:'spike'},{x:7000,type:'spike'},{x:1900,type:'block'},
      {x:3200,type:'block'},{x:5500,type:'block'}
    ]
  },
  {
    name: 'Expert', color: '#ef4444', speed: 6, length: 9000,
    obstacles: [
      {x:250,type:'spike'},{x:400,type:'spike'},{x:550,type:'spike'},
      {x:700,type:'spike'},{x:850,type:'spike'},{x:1000,type:'spike'},
      {x:1200,type:'spike'},{x:1350,type:'spike'},{x:1500,type:'spike'},
      {x:1650,type:'spike'},{x:1800,type:'spike'},{x:1950,type:'spike'},
      {x:2150,type:'spike'},{x:2300,type:'spike'},{x:2450,type:'spike'},
      {x:2600,type:'spike'},{x:2750,type:'spike'},{x:2950,type:'spike'},
      {x:3100,type:'spike'},{x:3250,type:'spike'},{x:3400,type:'spike'},
      {x:3600,type:'spike'},{x:3800,type:'spike'},{x:4000,type:'spike'},
      {x:4150,type:'spike'},{x:4300,type:'spike'},{x:4450,type:'spike'},
      {x:4600,type:'spike'},{x:4800,type:'spike'},{x:5000,type:'spike'},
      {x:5200,type:'spike'},{x:5400,type:'spike'},{x:5550,type:'spike'},
      {x:5700,type:'spike'},{x:5850,type:'spike'},{x:6000,type:'spike'},
      {x:6200,type:'spike'},{x:6400,type:'spike'},{x:6600,type:'spike'},
      {x:6800,type:'spike'},{x:7000,type:'spike'},{x:7200,type:'spike'},
      {x:7400,type:'spike'},{x:7600,type:'spike'},{x:7800,type:'spike'},
      {x:1450,type:'block'},{x:2750,type:'block'},{x:4150,type:'block'},
      {x:5550,type:'block'},{x:7000,type:'block'}
    ]
  }
];

// ===== SAVE =====
function saveProgress(){try{localStorage.setItem('gdProgress',JSON.stringify(completed))}catch(e){}}
function loadProgress(){try{const d=localStorage.getItem('gdProgress');if(d)completed=JSON.parse(d)}catch(e){}}

// ===== GAME STATE =====
let state = 'menu';
let levelIdx = 0;
let completed = [false,false,false,false];
let scrollOffset = 0;
let attempts = 0;

const GROUND_Y = 370;
const PLAYER_X = 150;
const GRAVITY = 0.65;
const JUMP_FORCE = -10;

const player = {x:PLAYER_X,y:GROUND_Y-30,w:28,h:28,vy:0,grounded:true,rotation:0,alive:true};

let obstacles = [];
let particles = [];
let bgParticles = [];
let shakeX = 0, shakeY = 0, shakeMag = 0;
let holdJump = false;
let deadTimer = 0;
let completeTimer = 0;
let animFrame = 0;

// ===== AUDIO =====
let audioCtx = null;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)()}
function playTone(freq,dur,type='square',vol=.12){
  if(!audioCtx)return;
  try{
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type=type;o.frequency.value=freq;g.gain.value=vol;
    g.gain.exponentialRampToValueAtTime(.0001,audioCtx.currentTime+dur);
    o.connect(g);g.connect(audioCtx.destination);
    o.start();o.stop(audioCtx.currentTime+dur);
  }catch(e){}
}
function sfxJump(){playTone(440,.08,'square',.06);playTone(660,.06,'sine',.04)}
function sfxDeath(){playTone(300,.15,'sawtooth',.08);setTimeout(()=>playTone(200,.2,'sawtooth',.06),100)}
function sfxComplete(){playTone(523,.1,'sine',.08);setTimeout(()=>playTone(659,.1,'sine',.08),100);setTimeout(()=>playTone(784,.15,'sine',.1),200)}

// ===== LEVEL SETUP =====
function loadLevel(idx){
  levelIdx = idx;
  const lv = LEVELS[idx];
  scrollOffset = 0;
  attempts = 0;
  obstacles = lv.obstacles.map(o=>({...o}));
  resetPlayer();
  particles = [];
  shakeMag = 0;
  deadTimer = 0;
  completeTimer = 0;
  holdJump = false;
  state = 'playing';
  document.getElementById('menuScreen').classList.add('hidden');
  document.getElementById('deathOverlay').classList.remove('show');
  document.getElementById('completeOverlay').classList.remove('show');
  document.getElementById('hud').style.display = 'flex';
  document.getElementById('pauseBtn').style.display = 'block';
  document.getElementById('menuBtn').style.display = 'block';
  updateHUD();
}

function resetPlayer(){
  player.x = PLAYER_X;
  player.y = GROUND_Y - player.h;
  player.vy = 0;
  player.grounded = true;
  player.rotation = 0;
  player.alive = true;
}

function updateHUD(){
  const lv = LEVELS[levelIdx];
  document.getElementById('hudLevel').textContent = `Nível ${levelIdx+1}: ${lv.name}`;
  document.getElementById('hudAttempts').textContent = `#${attempts}`;
  const pct = Math.min(100, Math.round((scrollOffset / lv.length) * 100));
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('hudPct').textContent = pct + '%';
  document.documentElement.style.setProperty('--lvl-color', lv.color);
}

// ===== INIT BACKGROUND =====
function initBgParticles(){
  bgParticles = [];
  for(let i=0;i<60;i++){
    bgParticles.push({
      x:Math.random()*W,y:Math.random()*H,
      size:Math.random()*2+1,speed:Math.random()*.3+.1,
      alpha:Math.random()*.5+.2
    });
  }
}
initBgParticles();

// ===== UPDATE =====
function update(){
  if(state !== 'playing') return;
  const lv = LEVELS[levelIdx];
  animFrame++;

  // Hold-to-jump (GD style)
  if(holdJump && player.grounded && player.alive){
    player.vy = JUMP_FORCE;
    player.grounded = false;
    sfxJump();
  }

  // Physics
  if(player.alive){
    player.vy += GRAVITY;
    player.y += player.vy;
    player.rotation += player.vy * 1.2;

    // Ground collision
    if(player.y + player.h >= GROUND_Y){
      player.y = GROUND_Y - player.h;
      player.vy = 0;
      player.grounded = true;
      player.rotation = 0;
    }

    // Off-screen death (ceiling or fall)
    if(player.y + player.h < -50 || player.y > H + 50){
      die();
      return;
    }
  }

  // Scroll
  if(player.alive){
    scrollOffset += lv.speed;
  }

  // Obstacle collision
  if(player.alive){
    const px = player.x, py = player.y, pw = player.w, ph = player.h;
    for(const obs of obstacles){
      const sx = obs.x - scrollOffset;
      if(sx > W + 50 || sx < -60) continue;
      let collide = false;
      if(obs.type === 'spike'){
        const sh = 26, sw = 26;
        const ox = sx + 2, oy = GROUND_Y - sh;
        if(px < ox + sw && px + pw > ox && py < oy + sh && py + ph > oy){
          collide = true;
        }
      } else if(obs.type === 'block'){
        const bw = 28, bh = 40;
        const ox = sx + 1, oy = GROUND_Y - bh;
        if(px < ox + bw && px + pw > ox && py < oy + bh && py + ph > oy){
          collide = true;
        }
      }
      if(collide){ die(); return; }
    }
  }

  // Progress / complete
  if(scrollOffset >= lv.length && player.alive){
    player.alive = false;
    state = 'completed';
    sfxComplete();
    completed[levelIdx] = true;
    saveProgress();
    document.getElementById('completeSub').textContent = `Nível ${levelIdx+1}: ${lv.name}`;
    document.getElementById('completeAttempts').textContent = `Tentativas: ${attempts}`;
    const nextBtn = document.getElementById('nextBtn');
    if(levelIdx < LEVELS.length - 1){
      nextBtn.style.display = 'inline-block';
    } else {
      nextBtn.style.display = 'none';
    }
    setTimeout(()=>{
      document.getElementById('completeOverlay').classList.add('show');
    }, 400);
    updateHUD();
  }

  // Particles
  updateParticles();

  // Shake
  if(shakeMag > 0){
    shakeX = (Math.random() - .5) * shakeMag;
    shakeY = (Math.random() - .5) * shakeMag;
    shakeMag *= .85;
    if(shakeMag < .5){ shakeMag = 0; shakeX = 0; shakeY = 0; }
  }

  updateHUD();
}

// ===== DIE =====
function die(){
  if(!player.alive) return;
  player.alive = false;
  state = 'dead';
  sfxDeath();
  shakeMag = 12;
  attempts++;
  // Explosion particles
  for(let i=0;i<20;i++){
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 4 + 2;
    particles.push({
      x: player.x + player.w/2,
      y: player.y + player.h/2,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 2,
      size: Math.random() * 6 + 3,
      life: 1,
      color: LEVELS[levelIdx].color
    });
  }
  document.getElementById('deathAttempts').textContent = `Tentativa #${attempts}`;
  setTimeout(()=>{
    document.getElementById('deathOverlay').classList.add('show');
  }, 500);
}

// ===== PARTICLES =====
function updateParticles(){
  for(let i=particles.length-1;i>=0;i--){
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += .15;
    p.life -= .025;
    if(p.life <= 0) particles.splice(i,1);
  }
}

// ===== RENDER =====
function render(){
  ctx.save();
  ctx.translate(shakeX, shakeY);

  // Background
  const lv = LEVELS[levelIdx];
  ctx.fillStyle = '#0f0f23';
  ctx.fillRect(0,0,W,H);

  // Background gradient
  const grad = ctx.createLinearGradient(0,0,0,GROUND_Y);
  grad.addColorStop(0, lv.color + '15');
  grad.addColorStop(1, lv.color + '05');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,W,GROUND_Y);

  // Parallax particles
  for(const bp of bgParticles){
    ctx.globalAlpha = bp.alpha;
    ctx.fillStyle = lv.color;
    const px = (bp.x - scrollOffset * bp.speed * .05) % (W + 20);
    ctx.beginPath();
    ctx.arc(px < -10 ? px + W + 20 : px, bp.y, bp.size, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Grid lines
  ctx.strokeStyle = lv.color + '08';
  ctx.lineWidth = 1;
  for(let i=0;i<W;i+=40){
    const x = (i - scrollOffset * .2) % (W + 40);
    ctx.beginPath();
    ctx.moveTo(x < -40 ? x + W + 40 : x, 0);
    ctx.lineTo(x < -40 ? x + W + 40 : x, GROUND_Y);
    ctx.stroke();
  }

  // Ground
  ctx.fillStyle = '#1a1a35';
  ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
  ctx.fillStyle = lv.color;
  ctx.fillRect(0, GROUND_Y - 3, W, 3);

  // Ground line pattern
  ctx.strokeStyle = lv.color + '20';
  ctx.lineWidth = 1;
  for(let i=0;i<W;i+=20){
    const x = (i - scrollOffset) % (W + 20);
    ctx.beginPath();
    ctx.moveTo(x < -20 ? x + W + 20 : x, GROUND_Y + 8);
    ctx.lineTo(x < -20 ? x + W + 20 : x, GROUND_Y + 14);
    ctx.stroke();
  }

  // Obstacles
  for(const obs of obstacles){
    const sx = obs.x - scrollOffset;
    if(sx > W + 50 || sx < -60) continue;
    if(obs.type === 'spike'){
      const sw = 30, sh = 28;
      ctx.fillStyle = '#fff';
      ctx.shadowColor = lv.color;
      ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.moveTo(sx, GROUND_Y);
      ctx.lineTo(sx + sw/2, GROUND_Y - sh);
      ctx.lineTo(sx + sw, GROUND_Y);
      ctx.closePath();
      ctx.fill();
      ctx.shadowBlur = 0;
      // Inner
      ctx.fillStyle = lv.color;
      ctx.beginPath();
      ctx.moveTo(sx + 3, GROUND_Y);
      ctx.lineTo(sx + sw/2, GROUND_Y - sh + 3);
      ctx.lineTo(sx + sw - 3, GROUND_Y);
      ctx.closePath();
      ctx.fill();
    } else if(obs.type === 'block'){
      const bw = 28, bh = 40;
      ctx.fillStyle = lv.color;
      ctx.shadowColor = lv.color;
      ctx.shadowBlur = 10;
      ctx.fillRect(sx, GROUND_Y - bh, bw, bh);
      ctx.shadowBlur = 0;
      // Border
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.strokeRect(sx, GROUND_Y - bh, bw, bh);
    }
  }

  // Player
  if(player.alive || state === 'dead'){
    const px = player.x, py = player.y;
    ctx.save();
    ctx.translate(px + player.w/2, py + player.h/2);
    ctx.rotate(player.rotation * Math.PI / 180);

    // Trail
    if(player.alive){
      ctx.globalAlpha = .15;
      ctx.fillStyle = lv.color;
      for(let t=1;t<=4;t++){
        ctx.save();
        ctx.translate(-t * 6, 0);
        ctx.rotate((player.rotation - t * 8) * Math.PI / 180);
        ctx.fillRect(-player.w/2, -player.h/2, player.w, player.h);
        ctx.restore();
      }
      ctx.globalAlpha = 1;
    }

    // Glow
    ctx.shadowColor = '#fff';
    ctx.shadowBlur = 15;
    // Player body
    ctx.fillStyle = '#fff';
    ctx.fillRect(-player.w/2, -player.h/2, player.w, player.h);
    ctx.shadowBlur = 0;
    // Eye
    ctx.fillStyle = '#111';
    ctx.fillRect(3, -6, 8, 8);
    ctx.fillStyle = '#fff';
    ctx.fillRect(5, -4, 3, 3);
    ctx.restore();
  }

  // Dead particles
  for(const p of particles){
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
  }
  ctx.globalAlpha = 1;

  ctx.restore();
}

// ===== GAME LOOP =====
function gameLoop(){
  update();
  render();
  requestAnimationFrame(gameLoop);
}

// ===== MENU =====
function buildMenu(){
  const grid = document.getElementById('levelGrid');
  grid.innerHTML = '';
  for(let i=0;i<LEVELS.length;i++){
    const lv = LEVELS[i];
    const unlock = i === 0 || completed[i-1];
    const btn = document.createElement('div');
    btn.className = 'levelBtn' + (unlock ? '' : ' locked') + (completed[i] ? ' completed' : '');
    btn.style.setProperty('--lvl-color', lv.color);
    btn.innerHTML = `
      <div class="lvlNum" style="color:${lv.color}">NÍVEL ${i+1}</div>
      <div class="lvlName">${lv.name}</div>
      <div class="stars">${'★'.repeat(i+1)}${'☆'.repeat(4-i-1)}</div>
      ${completed[i] ? '<div class="check">✓</div>' : ''}
      ${completed[i] ? `<div class="lvlBar" style="width:100%"></div>` : ''}
      ${!unlock ? '<div style="font-size:20px;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);opacity:.4">🔒</div>' : ''}
    `;
    if(unlock){
      btn.addEventListener('click', ()=>{
        initAudio();
        loadLevel(i);
        render();
      });
    }
    grid.appendChild(btn);
  }
}

// ===== EVENTS =====
function handleDown(e){
  e.preventDefault();
  initAudio();
  if(state === 'playing'){
    holdJump = true;
    if(player.grounded && player.alive){
      player.vy = JUMP_FORCE;
      player.grounded = false;
      sfxJump();
    }
  }
}
function handleUp(e){
  e.preventDefault();
  holdJump = false;
}

// Keyboard
document.addEventListener('keydown', e=>{
  if(e.key === ' ' || e.key === 'ArrowUp' || e.key === 'w'){
    e.preventDefault();
    handleDown(e);
  }
  if(e.key === 'p' || e.key === 'P'){
    if(state === 'playing'){ state = 'paused'; document.getElementById('pauseBtn').textContent = '▶'; }
    else if(state === 'paused'){ state = 'playing'; document.getElementById('pauseBtn').textContent = '⏸'; }
  }
  if(e.key === 'Escape' && state !== 'menu'){
    goMenu();
  }
});
document.addEventListener('keyup', e=>{
  if(e.key === ' ' || e.key === 'ArrowUp' || e.key === 'w'){
    e.preventDefault();
    handleUp(e);
  }
});

// Touch / mouse
canvas.addEventListener('mousedown', handleDown);
canvas.addEventListener('mouseup', handleUp);
canvas.addEventListener('mouseleave', handleUp);
canvas.addEventListener('touchstart', handleDown, {passive:false});
canvas.addEventListener('touchend', handleUp, {passive:false});
canvas.addEventListener('touchcancel', handleUp, {passive:false});

// Buttons
document.getElementById('retryBtn').addEventListener('click', ()=>{
  document.getElementById('deathOverlay').classList.remove('show');
  loadLevel(levelIdx);
});
document.getElementById('deathMenuBtn').addEventListener('click', goMenu);
document.getElementById('nextBtn').addEventListener('click', ()=>{
  document.getElementById('completeOverlay').classList.remove('show');
  if(levelIdx < LEVELS.length - 1) loadLevel(levelIdx + 1);
});
document.getElementById('completeRetryBtn').addEventListener('click', ()=>{
  document.getElementById('completeOverlay').classList.remove('show');
  loadLevel(levelIdx);
});
document.getElementById('completeMenuBtn').addEventListener('click', goMenu);
document.getElementById('menuBtn').addEventListener('click', goMenu);
document.getElementById('pauseBtn').addEventListener('click', ()=>{
  if(state === 'playing'){ state = 'paused'; document.getElementById('pauseBtn').textContent = '▶'; }
  else if(state === 'paused'){ state = 'playing'; document.getElementById('pauseBtn').textContent = '⏸'; }
});

function goMenu(){
  state = 'menu';
  document.getElementById('menuScreen').classList.remove('hidden');
  document.getElementById('deathOverlay').classList.remove('show');
  document.getElementById('completeOverlay').classList.remove('show');
  document.getElementById('hud').style.display = 'none';
  document.getElementById('pauseBtn').style.display = 'none';
  document.getElementById('menuBtn').style.display = 'none';
  buildMenu();
}

// ===== START =====
loadProgress();
buildMenu();
document.getElementById('hud').style.display = 'none';
document.getElementById('pauseBtn').style.display = 'none';
document.getElementById('menuBtn').style.display = 'none';
gameLoop();
</script>
</body>
</html>
