<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moto Rider: Custom Championship</title>
    <style>
        body { margin: 0; background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: 'Impact', 'Arial Black', sans-serif; flex-direction: column; overflow: hidden; user-select: none; }
        #menu { background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.6)), linear-gradient(90deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0) 49.5%, #555 49.5%, #111 50.5%, rgba(0,0,0,0) 50.5%), url('https://images.unsplash.com/photo-1599819811279-d5ad9cccf838?q=80&w=600&auto=format&fit=crop') left center/50% 100% no-repeat, url('https://images.unsplash.com/photo-1519501025264-65ba15a82390?q=80&w=600&auto=format&fit=crop') right center/50% 100% no-repeat; width: 100vw; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; box-shadow: inset 0 0 150px rgba(0,0,0,0.9); position: absolute; top: 0; left: 0; z-index: 10; }
        
        .stats-header { background: rgba(0,0,0,0.85); padding: 10px 25px; border-radius: 8px; border: 2px solid #f1c40f; color: #f1c40f; font-size: 20px; margin-bottom: 20px; text-shadow: 2px 2px 0px #000; box-shadow: 0 5px 15px rgba(0,0,0,0.5); display: flex; gap: 30px; letter-spacing: 1px; }
        .stats-header span { color: #fff; }

        .logo-container { border: 4px solid #555; background: linear-gradient(#222, #111); padding: 10px 40px; text-align: center; margin-bottom: 25px; box-shadow: 0 10px 20px rgba(0,0,0,0.7); border-radius: 4px; }
        .logo-container h1 { margin: 0; font-size: 50px; letter-spacing: 2px; color: #eee; text-shadow: 3px 3px 0px #b33939; text-transform: uppercase; }
        .container-botoes { display: flex; flex-direction: column; gap: 14px; width: 380px; }
        .btn-menu { background: linear-gradient(180deg, #2c2c2c 0%, #151515 100%); border: 3px solid #444; border-radius: 8px; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: all 0.2s ease; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .btn-text { font-size: 20px; color: #fff; text-transform: uppercase; letter-spacing: 1px; text-shadow: 1px 1px 2px rgba(0,0,0,0.8); }
        .btn-icon { width: 28px; height: 28px; display: flex; justify-content: center; align-items: center; font-size: 16px; border-radius: 4px; font-weight: bold; }
        .btn-play { border-color: #27ae60; } .btn-play .btn-icon { background: #2ecc71; color: #fff; }
        .btn-play:hover { background: linear-gradient(180deg, #34495e 0%, #1b2a38 100%); border-color: #2ecc71; }
        .btn-garagem { border-color: #d35400; } .btn-garagem .btn-icon { background: #e67e22; color: #fff; }
        .btn-garagem:hover { background: linear-gradient(180deg, #3a2312 0%, #1a0f07 100%); }
        .btn-config { border-color: #2980b9; } .btn-config .btn-icon { background: #3498db; color: #fff; }
        .btn-config:hover { background: linear-gradient(180deg, #132b3c 0%, #081520 100%); }
        
        .sub-painel { display: none; background: rgba(15, 15, 15, 0.95); border: 2px solid #555; border-radius: 6px; padding: 10px; margin-top: -5px; box-shadow: 0 5px 15px rgba(0,0,0,0.8); }
        .sub-painel label { font-family: sans-serif; font-size: 12px; color: #888; display: block; margin-bottom: 5px; text-transform: uppercase; }
        .sub-painel select { width: 100%; padding: 8px; background: #222; color: #fff; border: 1px solid #444; font-family: sans-serif; font-size: 14px; border-radius: 4px; margin-bottom: 5px; }
        
        /* Estilos da Loja/Garagem */
        #lista-motos { display: flex; flex-direction: column; gap: 6px; }
        .garagem-item { display: flex; justify-content: space-between; align-items: center; background: #222; padding: 8px 12px; border-radius: 4px; border: 1px solid #444; transition: background 0.2s; }
        .garagem-item:hover { background: #2a2a2a; }
        .garagem-item span { font-family: sans-serif; font-size: 14px; color: #eee; font-weight: bold; }
        .garagem-item button { padding: 6px 12px; font-weight: bold; cursor: pointer; border: none; border-radius: 4px; font-family: sans-serif; transition: transform 0.1s; }
        .garagem-item button:active { transform: scale(0.95); }
        .btn-select { background: #3498db; color: white; }
        .btn-select.active { background: #27ae60; box-shadow: 0 0 10px rgba(39, 174, 96, 0.5); }
        .btn-buy { background: #f1c40f; color: #000; box-shadow: 0 0 10px rgba(241, 196, 15, 0.3); }
        .btn-buy:hover { background: #f39c12; }
        .btn-locked { background: #444; color: #888; cursor: not-allowed; }
        .btn-locked:active { transform: none; }

        #tituloJogo { font-size: 24px; color: #f1c40f; margin: 5px 0; display: none; }
        canvas { border: 5px solid #333; background: #111; box-shadow: 0px 0px 30px rgba(0,0,0,0.8); display: none; }
        .instrucoes { margin-top: 10px; font-family: sans-serif; font-size: 14px; color: #aaa; display: none; }
        #gameOverScreen { display: none; position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.95)); z-index: 20; flex-direction: column; justify-content: center; align-items: center; }
        .go-title { font-size: 80px; color: #ff3333; margin: 0 0 15px 0; letter-spacing: 4px; text-shadow: 4px 4px 0px #330000, 0 0 20px rgba(255, 0, 0, 0.8), -2px -2px 0px #fff; }
        .go-stats-board { background: linear-gradient(180deg, #222 0%, #111 100%); border: 6px solid #444; border-radius: 4px; padding: 15px 30px; width: 380px; box-shadow: 0 15px 30px rgba(0,0,0,0.9); margin-bottom: 35px; }
        .go-stats-row { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #333; padding: 12px 0; font-size: 24px; color: #f1c40f; }
        .go-stats-row:last-child { border-bottom: none; }
        .go-stats-row span:first-child { color: #e0e0e0; font-size: 20px; }
        .go-buttons { display: flex; gap: 20px; }
        .btn-go { padding: 15px 25px; font-size: 20px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 10px; color: white; transition: transform 0.1s; }
        .btn-go:active { transform: scale(0.95); }
        .btn-restart { background: linear-gradient(180deg, #27ae60 0%, #145a32 100%); border: 3px solid #2ecc71; box-shadow: 0 0 15px rgba(46, 204, 113, 0.5); }
        .btn-home { background: linear-gradient(180deg, #2980b9 0%, #154360 100%); border: 3px solid #3498db; box-shadow: 0 0 15px rgba(52, 152, 219, 0.5); }
        .new-record { color: #2ecc71 !important; text-shadow: 0 0 10px #2ecc71; animation: pisca 1s infinite; }
        @keyframes pisca { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="menu">
        <div class="stats-header">
            <div>💰 Moedas: <span id="menu-moedas">0</span></div>
            <div>🏆 Recorde: <span id="menu-highscore">0</span></div>
        </div>

        <div class="logo-container"><h1>MOTO RIDER</h1></div>
        <div class="container-botoes">
            <div class="btn-menu btn-play" onclick="iniciarJogo()"><span class="btn-text">Começar o Jogo</span><span class="btn-icon">▶</span></div>
            
            <div class="btn-menu btn-garagem" onclick="toggleSub('sub-garagem')"><span class="btn-text">Garagem & Loja</span><span class="btn-icon">🛒</span></div>
            <div id="sub-garagem" class="sub-painel">
                <label>Suas Máquinas:</label>
                <div id="lista-motos">
                    <!-- Gerado via JavaScript -->
                </div>
            </div>

            <div class="btn-menu btn-config" onclick="toggleSub('sub-config')"><span class="btn-text">Configurações de Pista</span><span class="btn-icon">⚙</span></div>
            <div id="sub-config" class="sub-painel">
                <label style="margin-top:5px;">Cenário:</label>
                <select id="selectCidade">
                    <option value="terra">Interior / Rota de Terra</option>
                    <option value="metropole" selected>Metrópole Urbana</option>
                </select>
                <label style="margin-top:5px;">Horário da Corrida:</label>
                <select id="selectPeriodo">
                    <option value="dia">Dia ☀️</option>
                    <option value="noite" selected>Noite 🌙</option>
                </select>
            </div>
        </div>
    </div>

    <h2 id="tituloJogo">MOTO RIDER: CHAMPIONSHIP</h2>
    <canvas id="gameCanvas" width="600" height="600"></canvas>
    
    <div class="instrucoes" id="instrucoes">
        <p>Controles: <strong>A / D</strong> para os lados | <strong>W</strong> = Acelerar | <strong>S / Espaço</strong> = Frear</p>
    </div>

    <div id="gameOverScreen">
        <h1 class="go-title" id="go-title-text">GAME OVER</h1>
        <div class="go-stats-board">
            <div class="go-stats-row"><span>SCORE:</span> <span id="go-score">0</span></div>
            <div class="go-stats-row"><span>HIGH SCORE:</span> <span id="go-highscore">0</span></div>
            <div class="go-stats-row"><span>MOEDAS COLETADAS:</span> <span id="go-coins">+0</span></div>
            <div class="go-stats-row"><span>DISTANCE:</span> <span id="go-distance">0.0 KM</span></div>
        </div>
        <div class="go-buttons">
            <div class="btn-go btn-restart" onclick="reiniciarJogo()"><span>🔄 JOGAR NOVAMENTE</span></div>
            <div class="btn-go btn-home" onclick="voltarAoMenu()"><span>🏠 VOLTAR AO INÍCIO</span></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // --- SISTEMA DE PROGRESSÃO E SAVE ---
        let moedasTotais = 0;
        let highScore = 0;
        let tipoMotoSelecionada = 'biz'; // Moto padrão inicial

        const motosConfig = {
            biz: { nome: "Bizzinha 100cc", preco: 0, unlocked: true, velBase: 4.8, velMaxX: 9.0, larg: 26, cor: "#c0392b", onda: 'square', freq: 45, multGiro: 5.5, maxGiro: 110 },
            scooter: { nome: "Scooter 150cc", preco: 0, unlocked: true, velBase: 5.5, velMaxX: 8.0, larg: 34, cor: "#9b59b6", onda: 'sawtooth', freq: 55, multGiro: 5, maxGiro: 160 },
            trilha: { nome: "650cc Cross", preco: 150, unlocked: false, velBase: 7.0, velMaxX: 5.8, larg: 34, cor: "#e67e22", onda: 'triangle', freq: 38, multGiro: 6.5, maxGiro: 95 },
            custom: { nome: "Custom 1600cc", preco: 350, unlocked: false, velBase: 7.5, velMaxX: 4.8, larg: 34, cor: "#7f8c8d", onda: 'triangle', freq: 26, multGiro: 4.5, maxGiro: 75 },
            altaCilindrada: { nome: "Naked 1000cc", preco: 600, unlocked: false, velBase: 8.5, velMaxX: 6.2, larg: 34, cor: "#00e5ff", onda: 'sawtooth', freq: 42, multGiro: 5.5, maxGiro: 120 },
            sport: { nome: "Superbike 1300cc", preco: 1200, unlocked: false, velBase: 11.0, velMaxX: 5.0, larg: 34, cor: "#e74c3c", onda: 'sawtooth', freq: 48, multGiro: 6.5, maxGiro: 140 },
            eletrica: { nome: "Elétrica Pro", preco: 2500, unlocked: false, velBase: 9.5, velMaxX: 7.0, larg: 34, cor: "#2ecc71", onda: 'sine', freq: 60, multGiro: 11, maxGiro: 300 }
        };

        function carregarDados() {
            let dadosSalvos = localStorage.getItem('motoRiderSave');
            if (dadosSalvos) {
                let save = JSON.parse(dadosSalvos);
                moedasTotais = save.moedas || 0;
                highScore = save.highScore || 0;
                tipoMotoSelecionada = save.motoAtiva || 'biz';
                if (save.desbloqueadas) {
                    save.desbloqueadas.forEach(id => {
                        if (motosConfig[id]) motosConfig[id].unlocked = true;
                    });
                }
            }
            atualizarUI();
        }

        function salvarDados() {
            let desbloqueadas = Object.keys(motosConfig).filter(id => motosConfig[id].unlocked);
            let save = { moedas: moedasTotais, highScore: highScore, motoAtiva: tipoMotoSelecionada, desbloqueadas: desbloqueadas };
            localStorage.setItem('motoRiderSave', JSON.stringify(save));
            atualizarUI();
        }

        function atualizarUI() {
            document.getElementById('menu-moedas').innerText = moedasTotais;
            document.getElementById('menu-highscore').innerText = highScore.toLocaleString();
            renderizarGaragem();
        }

        function renderizarGaragem() {
            const lista = document.getElementById('lista-motos');
            lista.innerHTML = '';
            for (let id in motosConfig) {
                let m = motosConfig[id];
                let div = document.createElement('div');
                div.className = 'garagem-item';
                let btnHtml = '';
                
                if (m.unlocked) {
                    let btnClass = (id === tipoMotoSelecionada) ? 'btn-select active' : 'btn-select';
                    let btnTexto = (id === tipoMotoSelecionada) ? 'SELECIONADA' : 'EQUIPAR';
                    btnHtml = `<button class="${btnClass}" onclick="equiparMoto('${id}')">${btnTexto}</button>`;
                } else {
                    let podeComprar = moedasTotais >= m.preco;
                    let btnClass = podeComprar ? 'btn-buy' : 'btn-locked';
                    btnHtml = `<button class="${btnClass}" onclick="comprarMoto('${id}')">💰 ${m.preco}</button>`;
                }
                
                div.innerHTML = `<span>${m.nome}</span> ${btnHtml}`;
                lista.appendChild(div);
            }
        }

        function equiparMoto(id) { tipoMotoSelecionada = id; salvarDados(); }
        function comprarMoto(id) {
            let moto = motosConfig[id];
            if (!moto.unlocked && moedasTotais >= moto.preco) {
                moedasTotais -= moto.preco; moto.unlocked = true; tipoMotoSelecionada = id; salvarDados();
            }
        }
        // ----------------------------------------

        let gameRunning = false; let gameOver = false; let loopId = null; 
        let score = 0; let moedasPartida = 0; let distanciaPercorrida = 0; let tempoInicio = 0;
        let obstaculos = []; let elementosCenario = []; let particulas = []; let moedasTrack = [];
        let linhaEstradaY = 0; let frameCounter = 0;
        let lamas = []; let rampas = []; let estaNoAr = false; let tempoNoAr = 0; let escalaSalto = 1.0;

        let tipoCenario = 'metropole'; let periodoDia = 'noite';
        let moto = { x: 285, y: 460, largura: 34, altura: 75, velX: 6, cor: '#e74c3c', inclinacao: 0 };
        let velocidadeBase = 7; let velocidadeAtual = velocidadeBase;

        // MISSÕES
        let missoesDisponiveis = [
            { tipo: 'velocidade', alvo: 150, texto: "Alcance 150 KM/H" },
            { tipo: 'velocidade', alvo: 180, texto: "Chegue a 180 KM/H" },
            { tipo: 'salto', alvo: 2, texto: "Dê 2 saltos nas rampas" },
            { tipo: 'distancia', alvo: 1500, texto: "Pilote por 1.5 KM s/ bater" }
        ];
        let missaoAtual = null; let progressoMissao = 0; let timerMensagemSucesso = 0;

        function gerarNovaMissao() {
            let index = Math.floor(Math.random() * missoesDisponiveis.length);
            missaoAtual = JSON.parse(JSON.stringify(missoesDisponiveis[index]));
            progressoMissao = 0;
            if (tipoCenario === 'metropole' && missaoAtual.tipo === 'salto') gerarNovaMissao(); 
        }

        function toggleSub(id) {
            let painel = document.getElementById(id);
            painel.style.display = (painel.style.display === 'block') ? 'none' : 'block';
        }

        let audioCtx = null; let osciladorMotor = null; let ganhoMotor = null; let filtroAudio = null; 
        let giroMotor = 0; let marchaAtual = 1; let configAudioMoto = {};

        function inicializarAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            osciladorMotor = audioCtx.createOscillator(); ganhoMotor = audioCtx.createGain(); filtroAudio = audioCtx.createBiquadFilter();
            osciladorMotor.type = configAudioMoto.onda; osciladorMotor.frequency.setValueAtTime(configAudioMoto.freq, audioCtx.currentTime);
            filtroAudio.type = 'lowpass'; filtroAudio.frequency.setValueAtTime(400, audioCtx.currentTime);
            ganhoMotor.gain.setValueAtTime(tipoMotoSelecionada === 'eletrica' ? 0.08 : 0.15, audioCtx.currentTime); 
            osciladorMotor.connect(filtroAudio); filtroAudio.connect(ganhoMotor); ganhoMotor.connect(audioCtx.destination);
            osciladorMotor.start();
        }

        function tocarSomMoeda() {
            if (!audioCtx || gameOver) return;
            let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
            osc.type = 'sine'; osc.frequency.setValueAtTime(1200, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(2500, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }

        function atualizarAudioMotor() {
            if (!audioCtx || gameOver) return;
            let alvoGiro = velocidadeAtual * configAudioMoto.multGiro;
            if (estaNoAr) alvoGiro = configAudioMoto.maxGiro * 1.3;
            giroMotor += (alvoGiro - giroMotor) * 0.08;

            if (tipoMotoSelecionada !== 'eletrica' && tipoMotoSelecionada !== 'scooter') {
                if (giroMotor > configAudioMoto.maxGiro && marchaAtual < 5) { marchaAtual++; giroMotor -= 40; tocarSomMarcha(); } 
                else if (giroMotor < (configAudioMoto.maxGiro - 50) && marchaAtual > 1) { marchaAtual--; giroMotor += 25; }
            }

            let frequenciaFinal = configAudioMoto.freq + (giroMotor * 1.1);
            if (tipoMotoSelecionada !== 'eletrica' && tipoMotoSelecionada !== 'scooter') frequenciaFinal -= (marchaAtual * 4);
            if (tipoMotoSelecionada === 'trilha' || tipoMotoSelecionada === 'custom' || tipoMotoSelecionada === 'biz') frequenciaFinal += Math.sin(Date.now() * 0.04) * 2.5;
            if(frequenciaFinal < 15) frequenciaFinal = 15;

            osciladorMotor.frequency.setTargetAtTime(frequenciaFinal, audioCtx.currentTime, 0.08);
            let corteFiltro = tipoMotoSelecionada === 'eletrica' ? frequenciaFinal * 4 + 400 : frequenciaFinal * 2.5 + 200;
            filtroAudio.frequency.setTargetAtTime(corteFiltro, audioCtx.currentTime, 0.08);
        }

        function tocarSomMarcha() {
            if (!audioCtx) return;
            let oscCort = audioCtx.createOscillator(); let gCort = audioCtx.createGain();
            oscCort.type = 'sine'; oscCort.frequency.setValueAtTime(configAudioMoto.freq * 1.3, audioCtx.currentTime);
            gCort.gain.setValueAtTime(0.06, audioCtx.currentTime); gCort.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.06);
            oscCort.connect(gCort); gCort.connect(audioCtx.destination); oscCort.start(); oscCort.stop(audioCtx.currentTime + 0.06);
        }

        function pararAudio() {
            if (osciladorMotor) { try { osciladorMotor.stop(); } catch(e){} }
            if (audioCtx) { audioCtx.close(); audioCtx = null; }
        }

        function mostrarTelaGameOver() {
            let recordeBatido = false;
            if (score > highScore) { highScore = Math.floor(score); recordeBatido = true; }
            moedasTotais += moedasPartida;
            salvarDados();

            let titleEl = document.getElementById("go-title-text");
            titleEl.innerText = "GAME OVER"; titleEl.className = "go-title";
            document.getElementById("go-score").innerText = score.toLocaleString();
            
            let hsEl = document.getElementById("go-highscore");
            hsEl.innerText = highScore.toLocaleString();
            hsEl.className = recordeBatido ? "new-record" : "";
            
            document.getElementById("go-coins").innerText = "+" + moedasPartida;
            document.getElementById("go-distance").innerText = (distanciaPercorrida / 1000).toFixed(1) + ' KM';
            document.getElementById("gameOverScreen").style.display = "flex";
        }

        function reiniciarJogo() { document.getElementById("gameOverScreen").style.display = "none"; iniciarJogo(); }
        function voltarAoMenu() {
            gameRunning = false; if (loopId) { cancelAnimationFrame(loopId); loopId = null; }
            document.getElementById("gameOverScreen").style.display = "none"; document.getElementById("tituloJogo").style.display = "none";
            canvas.style.display = "none"; document.getElementById("instrucoes").style.display = "none"; document.getElementById("menu").style.display = "flex";
            atualizarUI();
        }

        let teclas = {};
        window.addEventListener("keydown", (e) => { const t = e.key.toLowerCase(); teclas[t] = true; if([" ", "w", "a", "s", "d"].includes(t)) e.preventDefault(); });
        window.addEventListener("keyup", (e) => { teclas[e.key.toLowerCase()] = false; });

        function iniciarJogo() {
            if (loopId) { cancelAnimationFrame(loopId); loopId = null; }
            tipoCenario = document.getElementById("selectCidade").value; periodoDia = document.getElementById("selectPeriodo").value;
            
            let conf = motosConfig[tipoMotoSelecionada];
            velocidadeBase = conf.velBase; moto.cor = conf.cor; moto.velX = conf.velMaxX; moto.largura = conf.larg;
            configAudioMoto = conf;

            moto.x = 285; moto.y = 460; moto.inclinacao = 0; estaNoAr = false; tempoNoAr = 0; escalaSalto = 1.0; lamas = []; rampas = []; moedasTrack = [];
            score = 0; moedasPartida = 0; distanciaPercorrida = 0; marchaAtual = 1; giroMotor = 0; obstaculos = []; elementosCenario = []; particulas = []; gameOver = false;
            velocidadeAtual = velocidadeBase; frameCounter = 0; tempoInicio = Date.now(); timerMensagemSucesso = 0;
            
            gerarNovaMissao(); inicializarAudio();
            for (let y = 0; y < canvas.height; y += 100) { elementosCenario.push(gerarItemCenario(true, y)); elementosCenario.push(gerarItemCenario(false, y)); }

            document.getElementById("menu").style.display = "none"; document.getElementById("tituloJogo").style.display = "block";
            canvas.style.display = "block"; document.getElementById("instrucoes").style.display = "block";
            gameRunning = true; loop();
        }

        function gerarItemCenario(ladoEsquerdo, yInicial = -120) {
            let largura = Math.floor(Math.random() * 30) + 60; let altura = Math.floor(Math.random() * 40) + 70;
            let x = ladoEsquerdo ? Math.random() * 40 : canvas.width - largura - (Math.random() * 40);
            let subTipo = 'predio'; let cor = '';
            if (tipoCenario === 'metropole') { subTipo = Math.random() < 0.25 ? 'casa' : 'predio'; cor = subTipo === 'predio' ? `hsl(${200 + Math.random()*40}, 30%, ${periodoDia==='noite'?20:50}%)` : `hsl(${Math.random()*360}, 40%, ${periodoDia==='noite'?35:60}%)`; }

            ctx.fillStyle = tipoCenario === 'metropole' ? "#fff" : (periodoDia === 'noite' ? "#442e18" : "#634120"); for (let y = linhaEstradaY - 60; y < canvas.height; y += 60) { ctx.fillRect(245, y, 6, 25); ctx.fillRect(345, y, 6, 25); }

            lamas.forEach(lama => { ctx.save(); ctx.fillStyle = "rgba(45, 30, 15, 0.9)"; ctx.beginPath(); ctx.ellipse(lama.x + lama.largura/2, lama.y + lama.altura/2, lama.largura/2, lama.altura/2, 0, 0, Math.PI * 2); ctx.fill(); ctx.fillStyle = "rgba(25, 15, 5, 0.4)"; ctx.beginPath(); ctx.ellipse(lama.x + lama.largura/2 - 5, lama.y + lama.altura/2 - 3, lama.largura/3, lama.altura/3, 0, 0, Math.PI * 2); ctx.fill(); ctx.restore(); });
            rampas.forEach(rampa => { ctx.save(); ctx.fillStyle = "rgba(0,0,0,0.3)"; ctx.fillRect(rampa.x + 5, rampa.y + 5, rampa.largura, rampa.altura); ctx.fillStyle = "#d35400"; ctx.fillRect(rampa.x, rampa.y, rampa.largura, rampa.altura); let gradRampa = ctx.createLinearGradient(rampa.x, rampa.y + rampa.altura, rampa.x, rampa.y); gradRampa.addColorStop(0, "#f39c12"); gradRampa.addColorStop(1, "#f1c40f"); ctx.fillStyle = gradRampa; ctx.beginPath(); ctx.moveTo(rampa.x, rampa.y + rampa.altura); ctx.lineTo(rampa.x + rampa.largura, rampa.y + rampa.altura); ctx.lineTo(rampa.x + rampa.largura - 4, rampa.y); ctx.lineTo(rampa.x + 4, rampa.y); ctx.closePath(); ctx.fill(); ctx.fillStyle = "#222"; ctx.font = "bold 16px Arial"; ctx.textAlign = "center"; ctx.fillText("▲", rampa.x + rampa.largura/2, rampa.y + rampa.altura/2 + 5); ctx.fillText("▲", rampa.x + rampa.largura/2, rampa.y + rampa.altura/2 - 10); ctx.restore(); });

            desenharFarolMoto(ctx, moto.x, moto.y, moto.largura, tipoMotoSelecionada, moto.inclinacao);
            particulas.forEach(p => { ctx.fillStyle = `rgba(${p.corBase}, ${p.alfa})`; ctx.beginPath(); ctx.arc(p.x, p.y, p.raio, 0, Math.PI * 2); ctx.fill(); });
            
            // Desenhar Moedas
            moedasTrack.forEach(m => {
                ctx.save(); ctx.translate(m.x, m.y); ctx.scale(Math.max(0.1, Math.abs(Math.sin(frameCounter * 0.1))), 1);
                ctx.beginPath(); ctx.arc(0, 0, m.raio, 0, Math.PI * 2); ctx.fillStyle = "#f1c40f"; ctx.fill();
                ctx.lineWidth = 2; ctx.strokeStyle = "#d35400"; ctx.stroke();
                ctx.fillStyle = "#d35400"; ctx.font = "bold 14px Arial"; ctx.textAlign = "center"; ctx.fillText("$", 0, 5); ctx.restore();
            });

            obstaculos.forEach(obs => { desenharCarroRealista(ctx, obs); });

            let pisandoNoFreio = teclas["s"] || teclas[" "];
            desenharMotoRealista(ctx, moto.x, moto.y, moto.largura, moto.altura, tipoMotoSelecionada, moto.cor, moto.inclinacao, pisandoNoFreio);

            ctx.textAlign = "left"; ctx.fillStyle = "#fff"; ctx.font = "bold 19px Arial"; 
            ctx.fillText(`PONTOS: ${Math.floor(score)}`, 25, 40);
            ctx.fillStyle = "#f1c40f"; ctx.fillText(`MOEDAS: ${moedasPartida}`, 25, 65);
            ctx.fillStyle = "#fff"; let textoMarcha = (tipoMotoSelecionada === 'scooter') ? 'CVT' : ((tipoMotoSelecionada === 'eletrica') ? 'AUTO' : `${marchaAtual}ª`); ctx.fillText(`CÂMBIO: ${textoMarcha}`, 25, 90);

            let kmh = Math.floor(velocidadeAtual * 15); ctx.textAlign = "right"; ctx.fillStyle = teclas["w"] ? "#e74c3c" : "#f1c40f"; ctx.font = "bold 20px Arial"; ctx.fillText(`${kmh} KM/H`, canvas.width - 25, 45);

            if (missaoAtual) {
                ctx.fillStyle = "rgba(0, 0, 0, 0.6)"; ctx.fillRect(canvas.width - 230, 60, 215, 55); ctx.strokeStyle = "#3498db"; ctx.lineWidth = 2; ctx.strokeRect(canvas.width - 230, 60, 215, 55);
                ctx.textAlign = "right"; ctx.fillStyle = "#3498db"; ctx.font = "bold 14px Arial"; ctx.fillText("MISSÃO ATUAL", canvas.width - 25, 80); ctx.fillStyle = "#fff"; ctx.font = "13px Arial"; ctx.fillText(missaoAtual.texto, canvas.width - 25, 102);
                let progressoExibir = missaoAtual.tipo === 'distancia' ? (progressoMissao / 1000).toFixed(1) : progressoMissao; let alvoExibir = missaoAtual.tipo === 'distancia' ? (missaoAtual.alvo / 1000).toFixed(1) : missaoAtual.alvo;
                ctx.fillStyle = "#f1c40f"; ctx.font = "bold 12px Arial"; ctx.fillText(`[ ${progressoExibir} / ${alvoExibir} ]`, canvas.width - 180, 80);
            }

            ctx.textAlign = "center"; 
            if (timerMensagemSucesso > 0) {
                ctx.fillStyle = "#2ecc71"; ctx.font = "black 30px Impact"; ctx.fillText("MISSÃO CUMPRIDA! +500", canvas.width / 2, 120);
            } else if (estaNoAr) { ctx.fillStyle = "#ffeb3b"; ctx.font = "black 26px Impact"; ctx.fillText("SALTO ACROBÁTICO! 🚀", canvas.width / 2, 120); }
        }

        function loop() { if (!gameRunning) return; atualizar(); if (!gameOver) desenhar(); loopId = requestAnimationFrame(loop); }

        // Inicializa dados ao carregar a página
        window.onload = carregarDados;
    </script>
