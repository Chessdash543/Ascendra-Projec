<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IRONCLAD 3.0 - Demo Jogavel</title>
  <link rel="stylesheet" href="game.css">
</head>
<body>
  <main id="gameShell" aria-label="IRONCLAD 3.0 Demo Jogavel">
    <section id="mainMenu" class="menu">
      <div class="menu__panel">
        <div class="menu__header">
          <p class="menu__kicker">DEMO JOGAVEL</p>
          <h1>IRONCLAD 3.0</h1>
        </div>

        <div class="menu__grid">
          <label>
            <span>Classe de mecha</span>
            <select id="classSelect">
              <option value="vanguard">Vanguard - equilibrado</option>
              <option value="striker">Striker - rapido e agressivo</option>
              <option value="bulwark">Bulwark - pesado e resistente</option>
              <option value="specter">Specter - hack e energia</option>
            </select>
          </label>

          <label>
            <span>Faccao</span>
            <select id="factionSelect">
              <option value="aurora">Aurora Circuit - ciano</option>
              <option value="helix">Helix Foundry - amarelo</option>
              <option value="obsidian">Obsidian Front - vermelho</option>
              <option value="verdant">Verdant Grid - verde</option>
            </select>
          </label>

          <label>
            <span>Modo</span>
            <select id="modeSelect">
              <option value="campaign">Campanha</option>
              <option value="deathmatch">Deathmatch</option>
              <option value="battle">Battle Royale</option>
              <option value="survival">Sobrevivencia</option>
            </select>
          </label>

          <label>
            <span>Mapa</span>
            <select id="mapSelect">
              <option value="atlas">Atlas Prime</option>
              <option value="orbital">Doca Orbital K-9</option>
              <option value="neon">Deserto Neon Helix</option>
            </select>
          </label>

          <label>
            <span>Dificuldade</span>
            <select id="difficultySelect">
              <option value="normal">Normal</option>
              <option value="easy">Facil</option>
              <option value="hard">Pesado</option>
            </select>
          </label>

          <div class="menu__toggles">
            <label class="menu__check">
              <input id="soundToggle" type="checkbox" checked>
              <span>Som</span>
            </label>
            <label class="menu__check">
              <input id="shakeToggle" type="checkbox" checked>
              <span>Impacto de camera</span>
            </label>
          </div>
        </div>

        <div class="menu__actions">
          <button id="startButton" type="button">INICIAR</button>
          <p>Durante o jogo: M abre este menu.</p>
        </div>
      </div>
    </section>
    <canvas id="gameCanvas"></canvas>
  </main>
  <script src="game.js"></script>
</body>
</html>
